name: Run Script Daily at 6:00 seat_v6
on:
  schedule:
    # 北京时间 6:00 = UTC 时间 22:00（前一天）
    - cron: '40 21 * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        script: [script1.py, script2.py]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install fonts and Xvfb
        run: |
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-noto-color-emoji \
            xvfb \
            x11-utils

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run ${{ matrix.script }} and save full log
        env:
          DISPLAY: :99
        run: |
          mkdir -p screenshots
          timeout 50m python ${{ matrix.script }} 2>&1 | tee output.log

      - name: Encode full log for email (skip first 5 lines)
        id: encode_log
        run: |
          echo "LOG_FULL<<EOF" >> $GITHUB_ENV
          tail -n +6 output.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send email with full log content
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "座位自动预约日志 - $(date +'%Y-%m-%d') - ${{ matrix.script }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: ${{ env.LOG_FULL }}
          attachments: |
            screenshots/screenshot_*.png
            screenshots/captcha_click_*.png
